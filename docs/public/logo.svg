<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3eaf7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c8a65;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)"/>
  
  <!-- L字母 -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="50" font-weight="bold" 
        fill="white" text-anchor="middle">L</text>
  
  <!-- AI小标签 -->
  <circle cx="75" cy="30" r="12" fill="#FFD700"/>
  <text x="75" y="34" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
        fill="#333" text-anchor="middle">AI</text>
</svg>
